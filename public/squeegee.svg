<!-- 
  Crystal Vision Co. — Squeegee SVG
  Used as a decorative element. The actual animated squeegee is drawn on canvas.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 300" fill="none">
  <!-- Handle -->
  <rect x="55" y="0" width="10" height="200" rx="3" fill="#b0b0b0"/>
  <rect x="56" y="0" width="4" height="200" fill="#d4d4d4" opacity="0.5"/>
  
  <!-- T-connector -->
  <rect x="10" y="195" width="100" height="12" rx="3" fill="#666"/>
  
  <!-- Rubber blade -->
  <rect x="8" y="207" width="104" height="8" rx="2" fill="#1a3a5c"/>
  <rect x="8" y="207" width="104" height="2" fill="#fff" opacity="0.15"/>
  
  <!-- Water droplets -->
  <circle cx="20" cy="220" r="2.5" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="45" cy="225" r="2" fill="#0ea5e9" opacity="0.5"/>
  <circle cx="70" cy="222" r="3" fill="#0ea5e9" opacity="0.4"/>
  <circle cx="95" cy="218" r="2" fill="#0ea5e9" opacity="0.55"/>
  <circle cx="55" cy="230" r="1.5" fill="#22d3ee" opacity="0.3"/>
</svg>
