# Crystal Vision Co. — nginx vhost for rightnowsd.org
#
# Drop this file at /etc/nginx/sites-available/rightnowsd on the VPS
# (replace existing). Then: nginx -t && systemctl reload nginx
#
# Static files are served from /opt/crystalvision/dist/
# API requests are proxied to the crystalvision-api Docker container on port 3003.

server {
    server_name rightnowsd.org www.rightnowsd.org;

    # Static build output from Vite
    root /opt/crystalvision/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # API → Docker container (127.0.0.1:3003)
    location /api/ {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Long-lived cache for hashed assets (Vite stamps filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSL — certificates already provisioned by Certbot
    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/rightnowsd.org/fullchain.pem;   # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/rightnowsd.org/privkey.pem;     # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                           # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                             # managed by Certbot
}

server {
    if ($host = www.rightnowsd.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = rightnowsd.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name rightnowsd.org www.rightnowsd.org;
    return 404;
}
